<svg width="100%" viewBox="0 0 780 420" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --bg: #ffffff; --bg2: #f5f5f0; --p: #1a1a1a; --s: #6b6b65; --t: #9c9a92;
    --font-sans: system-ui, -apple-system, sans-serif;
    --teal: #0F6E56; --teal-bg: #E1F5EE; --teal-fill: #085041;
    --purple: #534AB7; --purple-bg: #EEEDFE; --purple-fill: #3C3489;
    --coral: #993C1D; --coral-bg: #FAECE7; --coral-fill: #712B13;
    --gold: #8B6914; --green: #16A34A;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18; --bg2: #2c2c2a; --p: #e8e6dc; --s: #9c9a92; --t: #6b6b65;
      --teal: #5DCAA5; --teal-bg: #085041; --teal-fill: #9FE1CB;
      --purple: #AFA9EC; --purple-bg: #3C3489; --purple-fill: #CECBF6;
      --coral: #F0997B; --coral-bg: #712B13; --coral-fill: #F5C4B3;
      --gold: #E8C55A; --green: #4ADE80;
    }
  }
  text { font-family: var(--font-sans); }

  /* ---- Component boxes ---- */
  .box-prime { fill: var(--teal-bg); stroke: var(--teal); stroke-width: 0.5; rx: 10; }
  .box-super { fill: var(--purple-bg); stroke: var(--purple); stroke-width: 0.5; rx: 10; }
  .box-lab   { fill: var(--coral-bg); stroke: var(--coral); stroke-width: 0.5; rx: 10; }

  .label { font-size: 13px; font-weight: 500; fill: var(--p); }
  .sub   { font-size: 11px; fill: var(--s); }
  .status { font-size: 11px; font-weight: 500; }

  /* ---- Glow pulse on active component ---- */
  @keyframes glow-teal {
    0%, 100% { filter: drop-shadow(0 0 0px transparent); }
    50% { filter: drop-shadow(0 0 6px var(--teal)); }
  }
  @keyframes glow-purple {
    0%, 100% { filter: drop-shadow(0 0 0px transparent); }
    50% { filter: drop-shadow(0 0 6px var(--purple)); }
  }
  @keyframes glow-coral {
    0%, 100% { filter: drop-shadow(0 0 0px transparent); }
    50% { filter: drop-shadow(0 0 6px var(--coral)); }
  }

  /* ---- Step visibility: 12s total cycle ---- */
  /* Step 1: Reflect      0s–2s   (Prime active) */
  /* Step 2: Spawn        2s–4s   (Prime→Supervisor) */
  /* Step 3: Work         4s–7s   (Lab active) */
  /* Step 4: Verify       7s–9s   (Prime active) */
  /* Step 5: Promote      9s–11s  (Supervisor active) */
  /* Step 6: Done        11s–12s  (pause, then loop) */

  .step { opacity: 0; }

  /* Step 1 — Reflect */
  .step-1 { animation: show-1 12s infinite; }
  @keyframes show-1 {
    0%   { opacity: 1; }
    16%  { opacity: 1; }
    17%  { opacity: 0; }
    100% { opacity: 0; }
  }
  .glow-1 { animation: glow-teal 1s ease-in-out 0s 2; }
  .prime-glow-1 { animation: glow-teal 1s ease-in-out 0s 2, glow-cycle-1 12s infinite; }
  @keyframes glow-cycle-1 {
    0%   { filter: drop-shadow(0 0 4px var(--teal)); }
    16%  { filter: drop-shadow(0 0 4px var(--teal)); }
    17%  { filter: none; }
    100% { filter: none; }
  }

  /* Step 2 — Spawn */
  .step-2 { animation: show-2 12s infinite; }
  @keyframes show-2 {
    0%   { opacity: 0; }
    16%  { opacity: 0; }
    17%  { opacity: 1; }
    33%  { opacity: 1; }
    34%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Step 3 — Work */
  .step-3 { animation: show-3 12s infinite; }
  @keyframes show-3 {
    0%   { opacity: 0; }
    33%  { opacity: 0; }
    34%  { opacity: 1; }
    58%  { opacity: 1; }
    59%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Step 4 — Verify */
  .step-4 { animation: show-4 12s infinite; }
  @keyframes show-4 {
    0%   { opacity: 0; }
    58%  { opacity: 0; }
    59%  { opacity: 1; }
    75%  { opacity: 1; }
    76%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* Step 5 — Promote */
  .step-5 { animation: show-5 12s infinite; }
  @keyframes show-5 {
    0%   { opacity: 0; }
    75%  { opacity: 0; }
    76%  { opacity: 1; }
    91%  { opacity: 1; }
    92%  { opacity: 0; }
    100% { opacity: 0; }
  }

  /* ---- Arrow flow animation ---- */
  @keyframes dash-flow {
    from { stroke-dashoffset: 20; }
    to   { stroke-dashoffset: 0; }
  }
  .arrow-flow {
    stroke-dasharray: 6 4;
    animation: dash-flow 0.6s linear infinite;
  }

  /* ---- Progress dots ---- */
  @keyframes dot-1 { 0%, 16%  { fill: var(--teal); } 17%, 100% { fill: var(--t); } }
  @keyframes dot-2 { 0%, 16%  { fill: var(--t); } 17%, 33%  { fill: var(--purple); } 34%, 100% { fill: var(--t); } }
  @keyframes dot-3 { 0%, 33%  { fill: var(--t); } 34%, 58%  { fill: var(--coral); }  59%, 100% { fill: var(--t); } }
  @keyframes dot-4 { 0%, 58%  { fill: var(--t); } 59%, 75%  { fill: var(--teal); }   76%, 100% { fill: var(--t); } }
  @keyframes dot-5 { 0%, 75%  { fill: var(--t); } 76%, 91%  { fill: var(--green); }  92%, 100% { fill: var(--t); } }

  .dot-1 { animation: dot-1 12s infinite; }
  .dot-2 { animation: dot-2 12s infinite; }
  .dot-3 { animation: dot-3 12s infinite; }
  .dot-4 { animation: dot-4 12s infinite; }
  .dot-5 { animation: dot-5 12s infinite; }

  /* ---- Checkmark ---- */
  @keyframes pop-in {
    0%   { transform: scale(0); opacity: 0; }
    50%  { transform: scale(1.2); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
</style>

<!-- ==================== COMPONENT BOXES ==================== -->

<!-- Prime -->
<rect class="box-prime" x="40" y="50" width="200" height="80"/>
<text class="label" x="140" y="82" text-anchor="middle" fill="var(--teal-fill)">Prime</text>
<text class="sub" x="140" y="100" text-anchor="middle">Known-good agent · :8401</text>

<!-- Supervisor -->
<rect class="box-super" x="290" y="50" width="200" height="80"/>
<text class="label" x="390" y="82" text-anchor="middle" fill="var(--purple-fill)">Supervisor</text>
<text class="sub" x="390" y="100" text-anchor="middle">Container lifecycle · :8400</text>

<!-- Lab -->
<rect class="box-lab" x="540" y="50" width="200" height="80"/>
<text class="label" x="640" y="82" text-anchor="middle" fill="var(--coral-fill)">Lab</text>
<text class="sub" x="640" y="100" text-anchor="middle">Ephemeral VM · :8402</text>

<!-- ==================== TIMELINE ==================== -->

<line x1="60" y1="170" x2="60" y2="370" stroke="var(--teal)" stroke-width="1.5" opacity="0.3"/>
<line x1="390" y1="170" x2="390" y2="370" stroke="var(--purple)" stroke-width="1.5" opacity="0.3"/>
<line x1="640" y1="170" x2="640" y2="370" stroke="var(--coral)" stroke-width="1.5" opacity="0.3"/>

<!-- ==================== STEP 1: REFLECT ==================== -->
<g class="step step-1">
  <!-- Active indicator on Prime -->
  <rect x="36" y="46" width="208" height="88" rx="12" fill="none" stroke="var(--teal)" stroke-width="2" opacity="0.6"/>
  <!-- Status text -->
  <rect x="20" y="172" width="160" height="26" rx="6" fill="var(--teal-bg)" stroke="var(--teal)" stroke-width="0.5"/>
  <text class="status" x="100" y="190" text-anchor="middle" fill="var(--teal-fill)">Analyzing codebase...</text>
  <!-- Reflect result -->
  <rect x="20" y="204" width="160" height="26" rx="6" fill="var(--teal-bg)" stroke="var(--teal)" stroke-width="0.5"/>
  <text class="status" x="100" y="222" text-anchor="middle" fill="var(--teal-fill)">Task: add helper tests</text>
</g>

<!-- ==================== STEP 2: SPAWN ==================== -->
<g class="step step-2">
  <!-- Arrow Prime → Supervisor -->
  <line x1="140" y1="250" x2="370" y2="250" stroke="var(--teal)" stroke-width="1.5" class="arrow-flow"/>
  <polygon points="375,250 365,245 365,255" fill="var(--teal)"/>
  <!-- Label -->
  <text class="status" x="255" y="242" text-anchor="middle" fill="var(--teal-fill)">spawn(program.md)</text>
  <!-- Supervisor active -->
  <rect x="286" y="46" width="208" height="88" rx="12" fill="none" stroke="var(--purple)" stroke-width="2" opacity="0.6"/>
  <rect x="300" y="260" width="180" height="26" rx="6" fill="var(--purple-bg)" stroke="var(--purple)" stroke-width="0.5"/>
  <text class="status" x="390" y="278" text-anchor="middle" fill="var(--purple-fill)">Creating lab/gen-73...</text>
</g>

<!-- ==================== STEP 3: WORK ==================== -->
<g class="step step-3">
  <!-- Arrow Supervisor → Lab -->
  <line x1="490" y1="250" x2="620" y2="250" stroke="var(--purple)" stroke-width="1.5" class="arrow-flow"/>
  <polygon points="625,250 615,245 615,255" fill="var(--purple)"/>
  <!-- Lab active -->
  <rect x="536" y="46" width="208" height="88" rx="12" fill="none" stroke="var(--coral)" stroke-width="2" opacity="0.6"/>
  <!-- Lab status lines -->
  <rect x="555" y="264" width="170" height="26" rx="6" fill="var(--coral-bg)" stroke="var(--coral)" stroke-width="0.5"/>
  <text class="status" x="640" y="282" text-anchor="middle" fill="var(--coral-fill)">Reading program.md</text>
  <rect x="555" y="296" width="170" height="26" rx="6" fill="var(--coral-bg)" stroke="var(--coral)" stroke-width="0.5"/>
  <text class="status" x="640" y="314" text-anchor="middle" fill="var(--coral-fill)">Writing tests...</text>
  <rect x="555" y="328" width="170" height="26" rx="6" fill="var(--coral-bg)" stroke="var(--coral)" stroke-width="0.5"/>
  <text class="status" x="640" y="346" text-anchor="middle" fill="var(--coral-fill)">Committed to gen-73</text>
</g>

<!-- ==================== STEP 4: VERIFY ==================== -->
<g class="step step-4">
  <!-- Arrow Lab → Prime (going back) -->
  <line x1="620" y1="290" x2="160" y2="290" stroke="var(--coral)" stroke-width="1.5" class="arrow-flow"/>
  <polygon points="155,290 165,285 165,295" fill="var(--coral)"/>
  <text class="status" x="390" y="282" text-anchor="middle" fill="var(--coral-fill)">done → verifying</text>
  <!-- Prime active -->
  <rect x="36" y="46" width="208" height="88" rx="12" fill="none" stroke="var(--teal)" stroke-width="2" opacity="0.6"/>
  <rect x="20" y="300" width="160" height="26" rx="6" fill="var(--teal-bg)" stroke="var(--teal)" stroke-width="0.5"/>
  <text class="status" x="100" y="318" text-anchor="middle" fill="var(--teal-fill)">236 tests pass</text>
  <rect x="20" y="332" width="160" height="26" rx="6" fill="var(--teal-bg)" stroke="var(--teal)" stroke-width="0.5"/>
  <text class="status" x="100" y="350" text-anchor="middle" fill="var(--teal-fill)">LLM review: approved</text>
</g>

<!-- ==================== STEP 5: PROMOTE ==================== -->
<g class="step step-5">
  <!-- Arrow Prime → Supervisor -->
  <line x1="140" y1="330" x2="370" y2="330" stroke="var(--green)" stroke-width="1.5" class="arrow-flow"/>
  <polygon points="375,330 365,325 365,335" fill="var(--green)"/>
  <text class="status" x="255" y="322" text-anchor="middle" fill="var(--green)">promote(gen-73)</text>
  <!-- Supervisor active -->
  <rect x="286" y="46" width="208" height="88" rx="12" fill="none" stroke="var(--purple)" stroke-width="2" opacity="0.6"/>
  <rect x="300" y="340" width="180" height="26" rx="6" fill="var(--purple-bg)" stroke="var(--purple)" stroke-width="0.5"/>
  <text class="status" x="390" y="358" text-anchor="middle" fill="var(--purple-fill)">Merged to main, tagged</text>
  <!-- Success checkmark -->
  <text x="500" y="358" font-size="18" fill="var(--green)">&#x2713;</text>
</g>

<!-- ==================== PROGRESS DOTS ==================== -->
<circle class="dot-1" cx="316" cy="395" r="5"/>
<circle class="dot-2" cx="340" cy="395" r="5"/>
<circle class="dot-3" cx="364" cy="395" r="5"/>
<circle class="dot-4" cx="388" cy="395" r="5"/>
<circle class="dot-5" cx="412" cy="395" r="5"/>

<text class="sub" x="268" y="400" text-anchor="end">reflect</text>
<text class="sub" x="466" y="400" text-anchor="start">promote</text>

</svg>
